<script defer src="/scripts/plyr.polyfilled.js"></script>

<script>
document.addEventListener('DOMContentLoaded',()=>{

const players=Plyr.setup('.plyr',{
controls:['play','progress','current-time']
});

const backgroundVideos=[
document.getElementById('background-video-1'),
document.getElementById('background-video-2'),
document.getElementById('background-video-3')
];

function stopAllBackgroundVideos(){
backgroundVideos.forEach(video=>{
if(!video)return;
video.style.display='none';
video.pause();
video.currentTime=0;
});
}

players.forEach((player,index)=>{

player.on('play',()=>{

players.forEach(other=>{
if(other!==player){
other.pause();
}
});

stopAllBackgroundVideos();

const bg=backgroundVideos[index];
if(!bg)return;

bg.style.display='block';
bg.currentTime=player.currentTime;
bg.play();

});

player.on('pause',()=>{
if(players.every(p=>p.paused)){
stopAllBackgroundVideos();
}
});

player.on('timeupdate',()=>{
const bg=backgroundVideos[index];
if(!bg)return;
bg.currentTime=player.currentTime;
});

player.on('ended',()=>{
if(players.every(p=>p.paused||p.ended)){
stopAllBackgroundVideos();
}
});

});

},{passive:true});
</script>
